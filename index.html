<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRIPNEX</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #050505;
    color: white;
}

header {
    text-align: center;
    padding: 100px 20px;
}

h1 {
    font-size: 60px;
}

h1 span {
    color: #9eff00;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 40px;
}

.card {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 10px;
}
</style>

</head>
<body>

<header>
    <h1>DRIPNE<span>X</span></h1>
    <p>genera respeto al siguiente nivel</p>
</header>

<section class="products">

<div class="card">
    <img src="Gorra1.png">
    <h3>Gorra Clemont</h3>
    <p>$65.000</p>
</div>

<div class="card">
    <img src="Gorra2.png">
    <h3>Gorra Urbana</h3>
    <p>$70.000</p>
</div>

<div class="card">
    <img src="Gorra3.png">
    <h3>Gorra Black</h3>
    <p>$60.000</p>
</div>

</section>

</body>
</html>
